ollama:
  host: http://localhost:11434
  model: llava:7b
  temperature: 0.1
  num_predict: 64

game_loop:
  fps: 4
  max_steps: 0
  cooldown_after_action: 0.3
  screenshot_scale: 0.5

emulator:
  window_title_contains: "Fusion"
  capture_method: windows

input:
  method: keyboard
  keys:
    A: Z
    B: X
    X: A
    Y: S
    DPAD_UP: UP
    DPAD_DOWN: DOWN
    DPAD_LEFT: LEFT
    DPAD_RIGHT: RIGHT
    START: RETURN
    BACK: BACKSPACE

state_processing:
  enable_ocr: false
  grayscale: true
  contrast_enhance: false

actions:
  button_hold_duration: 80
  dpad_hold_duration: 120

logging:
  level: INFO
  save_screenshots: false
  screenshot_dir: screenshots
