ollama:
  host: http://localhost:11434
  model: llama3.2-vision:11b
  temperature: 0.2
  num_predict: 128

game_loop:
  fps: 4
  max_steps: 0
  cooldown_after_action: 0.3
  screenshot_scale: 0.5

emulator:
  window_title_contains: "RetroArch"
  capture_method: windows

state_processing:
  enable_ocr: false
  grayscale: true
  contrast_enhance: false

actions:
  allowed_buttons:
    - A
    - B
    - X
    - Y
    - DPAD_UP
    - DPAD_DOWN
    - DPAD_LEFT
    - DPAD_RIGHT
    - START
    - BACK
    - LEFT_SHOULDER
    - RIGHT_SHOULDER
  button_hold_duration: 100
  dpad_hold_duration: 150

logging:
  level: INFO
  save_screenshots: false
  screenshot_dir: screenshots
